server {
    listen 80;
    server_name localhost;

    # Point to Laravel's public folder
    root /var/www/public;
    index index.php index.html;

    # Try to serve the file directly, fall back to Laravel's front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to PHP-FPM running in the app container
    location ~ \.php$ {
        fastcgi_pass app:9000;           # 'app' = service name in compose
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files like .env
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
